[pytest]
minversion = 7.0
pythonpath = .

addopts = 
    -q 
    --tb=short 
    --strict-markers 
    --strict-config 
    --maxfail=5

markers =
    unit: unit tests
    integration: integration tests
    preflight: preflight checker tests
    report: report structure tests
    prompt: prompt-related tests
    slow: slow tests (skipped by default)

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
