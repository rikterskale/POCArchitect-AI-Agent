[pytest]
# ====================== Core Configuration ======================

# Minimum pytest version required
minversion = 8.0

# Test discovery settings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default command-line options (quiet + useful output)
addopts = 
    -q 
    --tb=short 
    -ra 
    --strict-markers 
    --strict-config

# ====================== Markers ======================

markers =
    unit: Unit tests (fast, no external calls)
    integration: Integration tests (may use mocks or real components)
    preflight: Tests for the preflight checker
    report: Tests for report generation and structure consistency
    prompt: Tests for prompt building logic
    slow: Slow tests (e.g. real LLM calls - usually skipped)

# ====================== Coverage ======================

# Enable coverage when --cov is used
addopts = 
    --cov=pocarchitect 
    --cov-report=term-missing 
    --cov-report=html

# Optional: Fail build if coverage drops below this %
# fail_under = 60

# ====================== Warnings & Strictness ======================

# Treat most warnings as errors (good for clean code)
filterwarnings =
    error
    ignore::DeprecationWarning:pkg_resources:
    ignore::DeprecationWarning:pytest:

# ====================== Logging ======================

log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)s] %(message)s

# ====================== Environment ======================

# Ensure the package is importable during tests
pythonpath = .

# ====================== Other Useful Settings ======================

# Show summary of skipped/xfailed tests
xfail_strict = true

# Disable cache if you want fresh runs every time (optional)
# cache_dir = /dev/null
